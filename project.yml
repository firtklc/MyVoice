name: MyVoice
options:
  bundleIdPrefix: com.firat
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MyVoice:
    type: application
    platform: macOS
    sources:
      - path: MyVoice
        excludes:
          - whisper-bridge
          - Info.plist
          - MyVoice.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.firat.MyVoice
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: MyVoice/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyVoice/MyVoice.entitlements
        CODE_SIGN_IDENTITY: "MyVoice Dev"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        OTHER_LDFLAGS:
          - "-lwhisper"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/MyVoice/whisper-bridge"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
    postCompileScripts:
      - script: |
          # Copy dylibs to Frameworks
          mkdir -p "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          cp "${PROJECT_DIR}/libs/"*.dylib "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
        name: Copy whisper.cpp libraries

  MyVoiceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MyVoiceTests
    dependencies:
      - target: MyVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.firat.MyVoiceTests
        GENERATE_INFOPLIST_FILE: true
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/libs"
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/MyVoice/whisper-bridge"
